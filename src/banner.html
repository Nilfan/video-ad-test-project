<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Banner</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      .video-container {
        width: 100%;
        height: 100%;
        position: relative;
        background: #000;
      }

      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      #banner-link {
        position: absolute;
        inset: 0;
        z-index: 2;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 20px;
        text-decoration: none;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.65) 0%,
          transparent 60%
        );
      }

      .offer-text {
        font-family: Arial, sans-serif;
        font-size: 18px;
        font-weight: bold;
        color: #fff;
        margin-bottom: 8px;
      }

      .cta-btn {
        display: inline-block;
        padding: 10px 22px;
        background: #ff5c00;
        color: #fff;
        font-family: Arial, sans-serif;
        font-size: 14px;
        font-weight: bold;
        border-radius: 6px;
        pointer-events: none;
        width: 140px;
      }

      #sound-btn {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 10;
        width: 36px;
        height: 36px;
        border: 0;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.2);
        cursor: pointer;
        padding: 6px;
      }

      #sound-btn img {
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>

    <script>
      var ANALYTICS_URL = "https://example.com/analytics";
      var CLICK_LINK_KEY = "clickLink";

      var widgetUrl = new URL(location.href);
      var parentPage = document.referrer || "";

      function sendEvent(type) {
        var payload = JSON.stringify({
          type: type,
          timestamp: new Date().toISOString(),
          parentPage: parentPage,
          widgetUrl: widgetUrl.href,
        });

        var blob = new Blob([payload], { type: "application/json" });

        if (navigator.sendBeacon) {
          navigator.sendBeacon(ANALYTICS_URL, blob);
        } else {
          fetch(ANALYTICS_URL, {
            method: "POST",
            body: blob,
            keepalive: true,
          }).catch(function (e) {
            console.warn("analytics error", e);
          });
        }
      }

      document.addEventListener("DOMContentLoaded", function () {
        // Build the final click URL
        var clickLink = widgetUrl.searchParams.get(CLICK_LINK_KEY);
        var bannerLink = document.getElementById("banner-link");

        if (clickLink) {
          var targetUrl = new URL(clickLink);

          widgetUrl.searchParams.forEach(function (val, key) {
            if (key !== CLICK_LINK_KEY) {
              targetUrl.searchParams.append(key, val);
            }
          });

          bannerLink.href = targetUrl.href;
        }

        bannerLink.addEventListener("click", function () {
          sendEvent("click");
        });

        // Sound toggle
        var video = document.getElementById("banner-video");
        var soundBtn = document.getElementById("sound-btn");
        var soundIcon = document.getElementById("sound-icon");
        var muted = true;

        soundBtn.addEventListener("click", function (e) {
          e.stopPropagation();
          e.preventDefault();
          muted = !muted;
          video.muted = muted;
          soundIcon.src = muted
            ? "../assets/svg/mute-icon.svg"
            : "../assets/svg/unmute-icon.svg";
        });

        // Report impression
        sendEvent("impression");
      });
    </script>
  </head>
  <body>
    <div class="video-container">
      <video id="banner-video" autoplay muted loop playsinline>
        <source src="../assets/test-video-30s.mp4" type="video/mp4" />
      </video>

      <a id="banner-link" target="_blank" rel="noopener noreferrer">
        <p class="offer-text">Discover new opportunities</p>
        <span class="cta-btn">Learn more →</span>
      </a>

      <button id="sound-btn" type="button" aria-label="sound">
        <img id="sound-icon" src="../assets/svg/unmute-icon.svg" alt="" />
      </button>
    </div>
  </body>
</html>
